<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Wrap FAVICON.png inside a 1:1 viewBox and let the browser scale it
       proportionally. preserveAspectRatio="xMidYMid meet" centers the
       image and fits it entirely (no crop, no squish). -->
  <image href="FAVICON.png" width="64" height="64" preserveAspectRatio="xMidYMid meet"/>
</svg>
